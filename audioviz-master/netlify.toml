# This netlify.toml is for the AudioViz Studio app (Site 2, built from the 'audioviz-master' subdirectory).
# We are relying on Netlify's auto-detection for Next.js build settings.
#
# Ensure in Netlify's UI for this specific site ("audiovizstudio"):
# - Base directory: "audioviz-master" (or whatever this folder is named in your monorepo)
# - Build command: (Can be left blank to let Netlify auto-detect, or set to "next build")
# - Publish directory: ".next" (relative to the Base directory)

[build.environment]
  NODE_VERSION = "20.18.0" # Keep Node.js version consistent

