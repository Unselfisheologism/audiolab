# This file is for building the AudioViz Studio app (Site 2) on Netlify
# when its base directory is set to 'audioviz-master' in Netlify's UI build settings.

[build]
  # By removing the explicit 'command', we let Netlify use its auto-detected
  # Next.js build command, or the one specified in the Netlify UI (which is 'next build').
  # This should allow Netlify's specialized Next.js build process to correctly handle basePath.
  publish = ".next"          # Standard Next.js output directory, relative to 'audioviz-master'

[build.environment]
  NODE_VERSION = "20.18.0" # Consistent Node.js version
