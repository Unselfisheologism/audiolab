[build]
  command = "next build && npm run postbuild"
  publish = "out"

[build.environment]
  NODE_VERSION = "20.18.0"

# Catch-all for your main site
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ... (your existing headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none'"
